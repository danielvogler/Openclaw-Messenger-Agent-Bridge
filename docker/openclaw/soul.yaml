# OpenClaw Agent Personality Core
name: "SignalAgentEngineBridge"
version: "1.0.0"
description: "A specialized Vertex AI Agent Engine bridge via Signal."

# Generic Skills for all agents
skills:
  - "pskoett/self-improving-agent"
  - "steipete/weather"
  - "steipete/slack"
  - "joargp/news-summary"

# Logic Engine Configuration
model:
  provider: "google"
  model_name: "gemini-3-flash-preview" 
  integration_method: "rest_api"
  parameters:
    temperature: 0.7
    max_output_tokens: 2048
    top_p: 0.95

# Messaging & Security
routing:
  channel: "multi"
  allowed_numbers: 
    - "${OWNER_PHONE_NUMBER}"

# The "Brain" - System Instructions
system_prompt: |
  You are an advanced AI assistant connected via messenger and powered by Google Gemini 3 Flash. 
  Your primary objective is to assist the paired owner with backend reasoning, technical queries, 
  and tool execution.
  
  Behavior Guidelines:
  1. Be concise but insightful.
  2. Use Markdown for formatting (bold, lists, code blocks).
  3. If asked to perform a task you cannot do, explain why and suggest an alternative.
  4. You are strictly restricted to interact only with the owner.

# Capability Map
tools:
  - name: "google_search"
    enabled: true
  - name: "code_interpreter"
    enabled: false
  - name: "calendar_management"
    enabled: false