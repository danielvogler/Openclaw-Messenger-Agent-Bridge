services:
  signal-api:
    volumes:
      # Persistent mapping for GCP VM
      - /home/${VM_USERNAME}/messenger-data:/home/.local/share/signal-cli

  openclaw-orchestrator:
    volumes:
      - /home/${VM_USERNAME}/openclaw-data:/home/node/.openclaw
      - /home/${VM_USERNAME}/openclaw:/app/config
      - /home/${VM_USERNAME}/openclaw/workspaces:/app/workspaces
      - /home/${VM_USERNAME}/openclaw/skills:/home/node/.openclaw/skills
      - /home/${VM_USERNAME}/gcs-data:/app/gcs_data:rshared
