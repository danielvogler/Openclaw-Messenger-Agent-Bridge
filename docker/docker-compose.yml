services:
  signal-api:
    image: bbernhard/signal-cli-rest-api:latest
    container_name: signal-api
    restart: unless-stopped
    environment:
      - MODE=json-rpc
    ports:
      # Expose 8080 to the network
      - "8080:8080"

  openclaw-orchestrator:
    build: ./openclaw
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "18789:18789"
    environment:
      # GOOGLE AI STUDIO
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_API_KEY=${GOOGLE_API_KEY}

      # Telegram Bots
      - TELEGRAM_TOKEN_BOT_1=${TELEGRAM_TOKEN_BOT_1}
      - TELEGRAM_ID_BOT_1=${TELEGRAM_ID_BOT_1}
      - TELEGRAM_TOKEN_BOT_2=${TELEGRAM_TOKEN_BOT_2}
      - TELEGRAM_ID_BOT_2=${TELEGRAM_ID_BOT_2}
      - TELEGRAM_TOKEN_BOT_3=${TELEGRAM_TOKEN_BOT_3}
      - TELEGRAM_ID_BOT_3=${TELEGRAM_ID_BOT_3}
      - TELEGRAM_TOKEN_BOT_4=${TELEGRAM_TOKEN_BOT_4}
      - TELEGRAM_ID_BOT_4=${TELEGRAM_ID_BOT_4}
      - TELEGRAM_TOKEN_BOT_5=${TELEGRAM_TOKEN_BOT_5}
      - TELEGRAM_ID_BOT_5=${TELEGRAM_ID_BOT_5}

      # Github
      - GITHUB_PAT=${GITHUB_PAT}
      - GITHUB_REPO=${GITHUB_REPO}

      # Connect to the local Signal REST API container using exact OpenClaw variables
      - OPENCLAW_CONFIG_PATH=/app/config/openclaw.config.json5
      - OPENCLAW_SOUL_PATH=/app/config/soul.yaml # Look in the config folder instead

      # Routing prompts to Vertex AI
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - VERTEX_AI_PROJECT_ID=${GCP_PROJECT_ID}
      - VERTEX_AI_LOCATION=europe-west6
      - GOOGLE_APPLICATION_CREDENTIALS=

      # Docker Mac Network Fix
      - NODE_OPTIONS=--dns-result-order=ipv4first

      # Security Whitelisting
      - OWNER_PHONE_NUMBER=${OWNER_PHONE_NUMBER}
      - BOT_PHONE_NUMBER=${BOT_PHONE_NUMBER}
